<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="搜索 Exam Rescue 复习资料标题。">
    <title>搜索资料 | Exam Rescue</title>
    <link rel="icon" href="/yenrik-exam-rescue/assets/logos/exam-rescue.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/yenrik-exam-rescue/css/style.css">
    <link rel="stylesheet" href="/yenrik-exam-rescue/css/components.css">
    <link rel="stylesheet" href="/yenrik-exam-rescue/css/mobile.css">
  </head>
  <body data-page="search">
    <header class="site-header" data-site-header>
      <a class="brand" href="/yenrik-exam-rescue/">
        <img src="/yenrik-exam-rescue/assets/logos/exam-rescue.svg" alt="" width="36" height="36">
        <span>Exam Rescue</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="打开导航" data-nav-toggle>☰</button>
      <nav class="site-nav" data-site-nav aria-label="主导航">
        <a href="/yenrik-exam-rescue/" data-nav-link="home">首页</a>
        <a href="/yenrik-exam-rescue/pages/subject.html" data-nav-link="subjects">学科</a>
        <a href="/yenrik-exam-rescue/pages/search.html" data-nav-link="search">搜索</a>
        <a href="/yenrik-exam-rescue/pages/about.html" data-nav-link="about">关于</a>
        <button class="icon-button" type="button" aria-label="切换深色模式" title="切换深色模式" data-theme-toggle>◐</button>
      </nav>
    </header>

    <main>
      <section class="page-hero section">
        <p class="eyebrow">Search</p>
        <h1>搜索资料标题</h1>
        <form class="search-shell wide" role="search" data-search-form>
          <img src="/yenrik-exam-rescue/assets/icons/search.svg" alt="" width="22" height="22">
          <label class="sr-only" for="search-input">搜索资料标题</label>
          <input id="search-input" name="q" type="search" placeholder="输入关键词，例如 高数期末、英语作文、选择题" autocomplete="off" data-search-input>
          <button class="button primary" type="submit">搜索</button>
        </form>
      </section>

      <section class="section search-workspace">
        <aside class="filter-panel">
          <h2>筛选</h2>
          <div class="filter-group">
            <label for="subject-filter">学科</label>
            <select id="subject-filter" data-subject-filter>
              <option value="">全部学科</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="type-filter">类型</label>
            <select id="type-filter" data-type-filter>
              <option value="">全部类型</option>
            </select>
          </div>
        </aside>
        <div>
          <div class="result-bar">
            <span data-result-count>正在载入资料...</span>
          </div>
          <div class="resource-list" data-search-results></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Exam Rescue</span>
      <span>Title search across resources.</span>
    </footer>

    <script type="module" src="/yenrik-exam-rescue/js/app.js"></script>
  </body>
</html>
